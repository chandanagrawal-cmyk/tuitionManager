<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>
  <!-- Open book -->
  <path d="M18 30 Q18 26 22 26 L48 30 L48 74 L22 70 Q18 70 18 66 Z" fill="white" opacity="0.95"/>
  <path d="M82 30 Q82 26 78 26 L52 30 L52 74 L78 70 Q82 70 82 66 Z" fill="white" opacity="0.85"/>
  <!-- Book spine -->
  <rect x="47" y="28" width="6" height="46" rx="2" fill="white" opacity="0.5"/>
  <!-- Lines on left page -->
  <line x1="26" y1="40" x2="44" y2="41" stroke="#7c3aed" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="26" y1="48" x2="44" y2="49" stroke="#7c3aed" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="26" y1="56" x2="44" y2="57" stroke="#7c3aed" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <!-- Pencil on right page -->
  <g transform="rotate(-35, 67, 52)">
    <rect x="62" y="36" width="8" height="28" rx="1.5" fill="#fbbf24"/>
    <polygon points="62,64 70,64 66,72" fill="#f59e0b"/>
    <rect x="62" y="36" width="8" height="5" rx="1.5" fill="#d1d5db"/>
    <line x1="66" y1="70" x2="66" y2="72" stroke="#1f2937" stroke-width="1.5" stroke-linecap="round"/>
  </g>
</svg>
